# =========================================================================
#  Nginx server block — wesele.moneylet.pl (galeria ślubna)
#  Umieść w /etc/nginx/sites-available/wesele.moneylet.pl i zlinkuj do
#  sites-enabled, albo dołącz w istniejącej konfiguracji. Reużywa działającego
#  Nginx na VPS (obok MoneyLet) — nie instalujemy Caddy.
#
#  Uwaga: właściwe pliki (zdjęcia/wideo) NIE przechodzą przez ten serwer —
#  przeglądarka wysyła je bezpośrednio do Cloudflare R2. Tędy lecą tylko małe
#  żądania JSON/formularze oraz strumień ZIP dla admina.
# =========================================================================

# --- Zaufaj nagłówkom Cloudflare, by poprawnie odczytać IP gościa ---
# (zakresy Cloudflare; zaktualizuj wg https://www.cloudflare.com/ips/)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
	listen 80;
	listen [::]:80;
	server_name wesele.moneylet.pl;
	# Cloudflare (pomarańczowa chmurka) i tak wymusza HTTPS; przekieruj wprost.
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name wesele.moneylet.pl;

	# --- Cloudflare Origin Certificate (SSL mode: Full (strict)) ---
	ssl_certificate     /etc/ssl/cloudflare/wesele.moneylet.pl.pem;
	ssl_certificate_key /etc/ssl/cloudflare/wesele.moneylet.pl.key;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers off;

	# Małe żądania (presign/complete to JSON). Duże pliki idą do R2, nie tędy.
	client_max_body_size 12m;

	access_log /var/log/nginx/wesele.access.log;
	error_log  /var/log/nginx/wesele.error.log;

	# --- Strumieniowe pobieranie ZIP przez admina (duże, długie odpowiedzi) ---
	location /admin/download {
		proxy_pass http://127.0.0.1:3100;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		proxy_buffering off;          # przekazuj bajty od razu
		proxy_request_buffering off;
		proxy_read_timeout 3600s;     # duże archiwa mogą się pakować długo
		proxy_send_timeout 3600s;
	}

	location / {
		proxy_pass http://127.0.0.1:3100;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
		proxy_read_timeout 120s;
	}
}
